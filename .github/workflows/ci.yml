name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for Django to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/tasks/ > /dev/null; then
              echo "Django is up"
              break
            fi
            echo "Waiting for Django... ($i/30)"
            sleep 2
          done

      - name: Run Django migrations
        run: docker compose exec -T web python manage.py migrate

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is up"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done

      - name: Fix frontend folder ownership for Cypress
        run: sudo chown -R $(id -u):$(id -g) frontend

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          browser: chrome

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots
          if-no-files-found: ignore

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down Docker stack
        if: always()
        run: docker compose down -v