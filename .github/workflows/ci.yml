name: CI

on:
  push:
    branches: [main,master]
  pull_request:
    branches: [main,master]

e2e:
  runs-on: ubuntu-latest
  steps:
    - name: checkout code
      uses: actions/checkout@v3

    - name: set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name : create .env file
      run: cp .env .env

    - name : start docker stack
      run: docker compose up -d --build

    - name : weight django for get ready
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:8000/api/tasks/ > /dev/null; then
            echo "Django is up"
            break
          fi
          echo "waiting for django ..($i/30)"
          sleep 2
        done
    
    - name: run django migrations
      run: docker compose exec -T taskflow_web python manage.py migrate

    - name : weight  for Frontend get ready
      run: |
        for i in {1..30}; do
          if curl -s http://localhost:3000 > /dev/null; then
            echo "Frontend is up"
            break
          fi
          echo "waiting for django ..($i/30)"
          sleep 2
        done
    
    - name: Install frontend deps
      working-directory: frontend
      run: npm ci
    
    - name: Run cypress Test
      uses: cypress-io/github-action@v6
      with:
        working-directory: frontend
        browser: chrome
        instaall : false
    
    - name: upload screenshots on failure
      if : failure()
      uses: actions/upload-artifact@v4
      with:
        name: cypress-screenshots
        path: frontend/cypress/screenshots
        if-no-files-found: ignore
    
    - name: Show Docker logs on failure
      if: failure()
      run: docker compose logs
    
    - name: Tear down Docker stack
      if: always()
      run: docker compose down -v