name: CI

on:
  push:
    branches: [main,master]
  pull_request:
    branches: [main,master]

e2e:
  runs-on: ubuntu-latest
  steps:
    - name: checkout code
      uses: actions/checkout@v3

    - name: set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json